<section class="max-w-3xl mx-auto px-6 pb-20 sm:pb-28">
  <header class="text-center mb-10 sm:mb-12">
    <p class="font-script text-rose text-2xl sm:text-3xl mb-1">no mapa</p>
    <h2 class="font-display text-3xl sm:text-4xl font-semibold text-parchment">
      Os lugares da nossa história
    </h2>
  </header>

  <div
    class="rounded-2xl overflow-hidden border border-gold/20 shadow-glow h-[60vh] sm:h-[480px]"
    leaflet
    [leafletOptions]="opcoesMapa()"
    [leafletLayers]="camadasMarcadores()"
  ></div>
</section>
